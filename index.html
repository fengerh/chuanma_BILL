<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-web-app-capable" content="yes">
    <title>川麻 V15</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
            -webkit-user-select: none;
            user-select: none;
        }
        body {
            background: linear-gradient(to bottom right, #065f46, #022c22);
            color: #fff;
            min-height: 100vh;
            padding: 16px;
        }
        .container {
            max-width: 480px;
            margin: 0 auto;
        }
        .title {
            text-align: center;
            font-size: 28px;
            font-weight: bold;
            color: #facc15;
            margin: 10px 0;
        }
        .info-bar {
            display: flex;
            justify-content: space-around;
            align-items: center;
            font-size: 18px;
            margin: 10px 0 20px;
            flex-wrap: wrap;
            gap: 8px;
        }
        .setting-btn {
            color: #fff;
            background: transparent;
            border: none;
            font-size: 18px;
            cursor: pointer;
        }
        /* 本局结束提示 */
        .game-end-notice {
            background: linear-gradient(135deg, #facc15, #f59e0b);
            color: #1f2937;
            padding: 12px;
            border-radius: 12px;
            text-align: center;
            font-weight: bold;
            margin-bottom: 16px;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.8; }
            100% { opacity: 1; }
        }
        /* 回字形九宫格布局 */
        .players-container {
            width: 100%;
            aspect-ratio: 1 / 1;
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            grid-template-rows: 1fr 1fr 1fr;
            gap: 8px;
            margin-bottom: 20px;
        }
        .player-card {
            background: #047857;
            border-radius: 16px;
            padding: 12px 8px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: all 0.2s;
            cursor: pointer;
            border: 3px solid transparent;
            pointer-events: auto;
        }
        /* 玩家选择锁定状态 */
        .player-card.locked {
            opacity: 0.6;
            cursor: not-allowed;
            pointer-events: none;
        }
        /* 已选中的玩家在锁定状态下保持高亮 */
        .player-card.active.locked {
            opacity: 1;
            pointer-events: none;
        }
        /* 四个玩家方位 */
        .player-north { grid-column: 2 / 3; grid-row: 1 / 2; }
        .player-west  { grid-column: 1 / 2; grid-row: 2 / 3; }
        .player-east  { grid-column: 3 / 4; grid-row: 2 / 3; }
        .player-south { grid-column: 2 / 3; grid-row: 3 / 4; }

        .player-card.active {
            border-color: #facc15;
            transform: scale(1.05);
        }
        .player-card.hu {
            background: #facc15;
            color: #1f2937;
        }
        .player-name {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 6px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 100%;
            pointer-events: none;
        }
        .player-score {
            font-size: 28px;
            font-weight: bold;
            color: #4ade80;
            pointer-events: none;
        }
        .player-card.hu .player-score {
            color: #1f2937;
        }
        .btn {
            border: none;
            border-radius: 12px;
            padding: 14px;
            font-size: 17px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            color: #fff;
        }
        .btn:active {
            transform: scale(0.95);
        }
        .btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none;
        }
        .btn-green { background: #10b981; }
        .btn-red { background: #ef4444; }
        .btn-blue { background: #3b82f6; }
        .btn-yellow { background: #eab308; }
        .btn-gray { background: #6b7280; }

        /* 三种杠统一紫色渐变（从深到浅过渡） */
        .gang-angang { background: linear-gradient(135deg, #7c3aed, #6d28d9); } /* 暗杠：最深 */
        .gang-diangang { background: linear-gradient(135deg, #8b5cf6, #7c3aed); } /* 点杠：中间 */
        .gang-minggang { background: linear-gradient(135deg, #a78bfa, #8b5cf6); } /* 明杠：最浅 */

        /* 番数按钮渐变配色 */
        .fan-1 { background: linear-gradient(135deg, #22c55e, #16a34a); }
        .fan-2 { background: linear-gradient(135deg, #16a34a, #15803d); }
        .fan-4 { background: linear-gradient(135deg, #15803d, #166534); }
        .fan-8 { background: linear-gradient(135deg, #f87171, #ef4444); }
        .fan-16 { background: linear-gradient(135deg, #ef4444, #dc2626); }
        .fan-32 { background: linear-gradient(135deg, #dc2626, #b91c1c); }

        .panel {
            background: #047857;
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 16px;
            display: none;
        }
        .panel.active {
            display: block;
        }
        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }
        .grid-3 {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 8px;
        }
        /* 底部按钮布局：下一局(2份)、撤销(1份)、重新开始(1份) */
        .bottom-btn-grid {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr;
            gap: 8px;
            margin-bottom: 16px;
        }
        .history-box {
            background: #047857;
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 16px;
            max-height: 220px;
            overflow-y: auto;
        }
        .history-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 8px;
        }
        .total-box {
            background: #047857;
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 16px;
            overflow-x: auto;
        }
        .total-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 8px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            table-layout: fixed;
            min-width: 100%;
        }
        th, td {
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 10px 8px;
            text-align: center;
            font-size: 16px;
            white-space: nowrap;
        }
        th {
            background: rgba(0, 0, 0, 0.2);
            font-weight: bold;
        }
        .win { color: #4ade80; font-weight: bold; }
        .lose { color: #f87171; font-weight: bold; }
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 999;
            padding: 16px;
        }
        .modal-content {
            background: #065f46;
            border-radius: 16px;
            padding: 20px;
            width: 100%;
            max-width: 360px;
            max-height: 90vh;
            overflow-y: auto;
        }
        .modal-title {
            font-size: 20px;
            font-weight: bold;
            text-align: center;
            margin-bottom: 16px;
        }
        .input-box {
            width: 100%;
            background: #047857;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            padding: 12px;
            color: #fff;
            font-size: 16px;
            text-align: center;
            margin-bottom: 16px;
        }
        .setting-item {
            margin-bottom: 16px;
        }
        .setting-label {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 8px;
            display: block;
        }
        .current-setting {
            color: #facc15;
            font-size: 14px;
            margin-bottom: 8px;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="title">川麻 V15</div>
    <div class="info-bar">
        <div>第 <span id="round-num">1</span> 局</div>
        <button class="setting-btn" id="setting-btn">底分: <span id="base-score">1</span> | 杠倍: <span id="gang-multi">暗2/点2/明1</span></button>
    </div>

    <!-- 本局结束提示（默认隐藏） -->
    <div class="game-end-notice" id="game-end-notice" style="display: none;">
        🎉 本局已结束！已有三家胡牌，请点击「下一局」开始新局
    </div>

    <!-- 回字形玩家布局 -->
    <div class="players-container" id="players-container"></div>

    <div class="panel active" id="main-panel">
        <!-- 第一排：自摸、点炮 -->
        <div class="grid-2" style="margin-bottom: 8px;">
            <button class="btn btn-red" id="btn-zimo">自摸</button>
            <button class="btn btn-green" id="btn-dianpao">点炮</button>
        </div>
        <!-- 第二排：三个杠牌按钮（统一紫色渐变） -->
        <div class="grid-3">
            <button class="btn gang-angang" id="btn-angang">暗杠</button>
            <button class="btn gang-diangang" id="btn-diangang">点杠</button>
            <button class="btn gang-minggang" id="btn-minggang">明杠</button>
        </div>
    </div>

    <div class="panel" id="fan-panel">
        <div class="modal-title">选择番数</div>
        <div class="grid-3">
            <button class="btn fan-1 fan-btn" data-fan="1">1番</button>
            <button class="btn fan-2 fan-btn" data-fan="2">2番</button>
            <button class="btn fan-4 fan-btn" data-fan="4">4番</button>
            <button class="btn fan-8 fan-btn" data-fan="8">8番</button>
            <button class="btn fan-16 fan-btn" data-fan="16">16番</button>
            <button class="btn fan-32 fan-btn" data-fan="32">32番</button>
        </div>
        <div class="grid-2" style="margin-top: 8px;">
            <input type="number" class="input-box" id="custom-fan" placeholder="自定义番数">
            <button class="btn btn-green" id="btn-custom-fan">确定</button>
        </div>
        <button class="btn btn-gray" id="btn-cancel-fan" style="margin-top: 8px;">取消</button>
    </div>

    <div class="panel" id="choose-panel">
        <div class="modal-title" id="choose-title"></div>
        <div class="grid-2" id="choose-list"></div>
        <button class="btn btn-gray" id="btn-cancel-choose" style="margin-top: 8px;">取消</button>
    </div>

    <!-- 底部按钮：顺序调整+大小适配 -->
    <div class="bottom-btn-grid">
        <button class="btn btn-blue" id="btn-next-round">下一局</button>
        <button class="btn btn-yellow" id="btn-undo">撤销</button>
        <button class="btn btn-red" id="btn-reset">重新开始</button>
    </div>

    <div class="history-box">
        <div class="history-title">操作记录</div>
        <div id="history-log"></div>
    </div>

    <div class="total-box">
        <div class="total-title">总战绩</div>
        <table id="total-table">
            <thead id="total-head"></thead>
            <tbody id="total-body"></tbody>
        </table>
    </div>
</div>

<!-- 全局设置弹窗 -->
<div class="modal" id="setting-modal">
    <div class="modal-content">
        <div class="modal-title">全局设置</div>
        
        <div class="setting-item">
            <label class="setting-label">底分设置</label>
            <div class="current-setting" id="current-base">当前底分：1</div>
            <div class="grid-3" style="margin-bottom: 8px;">
                <button class="btn btn-green base-btn" data-score="1">1</button>
                <button class="btn btn-green base-btn" data-score="5">5</button>
                <button class="btn btn-green base-btn" data-score="10">10</button>
                <button class="btn btn-green base-btn" data-score="20">20</button>
                <button class="btn btn-green base-btn" data-score="50">50</button>
                <button class="btn btn-green base-btn" data-score="100">100</button>
            </div>
            <div class="grid-2">
                <input type="number" class="input-box" id="custom-base" placeholder="自定义底分">
                <button class="btn btn-green" id="btn-custom-base">确定</button>
            </div>
        </div>

        <div class="setting-item">
            <label class="setting-label">暗杠倍数（底分×倍数）</label>
            <div class="current-setting" id="current-angang">当前暗杠：2倍</div>
            <div class="grid-3" style="margin-bottom: 8px;">
                <button class="btn gang-angang angang-btn" data-multi="1">1倍</button>
                <button class="btn gang-angang angang-btn" data-multi="2">2倍</button>
                <button class="btn gang-angang angang-btn" data-multi="4">4倍</button>
            </div>
            <div class="grid-2">
                <input type="number" class="input-box" id="custom-angang" placeholder="自定义倍数">
                <button class="btn gang-angang" id="btn-custom-angang">确定</button>
            </div>
        </div>

        <div class="setting-item">
            <label class="setting-label">点杠倍数（底分×倍数）</label>
            <div class="current-setting" id="current-diangang">当前点杠：2倍</div>
            <div class="grid-3" style="margin-bottom: 8px;">
                <button class="btn gang-diangang diangang-btn" data-multi="1">1倍</button>
                <button class="btn gang-diangang diangang-btn" data-multi="2">2倍</button>
                <button class="btn gang-diangang diangang-btn" data-multi="3">3倍</button>
            </div>
            <div class="grid-2">
                <input type="number" class="input-box" id="custom-diangang" placeholder="自定义倍数">
                <button class="btn gang-diangang" id="btn-custom-diangang">确定</button>
            </div>
        </div>

        <div class="setting-item">
            <label class="setting-label">明杠倍数（底分×倍数）</label>
            <div class="current-setting" id="current-minggang">当前明杠：1倍</div>
            <div class="grid-3" style="margin-bottom: 8px;">
                <button class="btn gang-minggang minggang-btn" data-multi="1">1倍</button>
                <button class="btn gang-minggang minggang-btn" data-multi="2">2倍</button>
                <button class="btn gang-minggang minggang-btn" data-multi="3">3倍</button>
            </div>
            <div class="grid-2">
                <input type="number" class="input-box" id="custom-minggang" placeholder="自定义倍数">
                <button class="btn gang-minggang" id="btn-custom-minggang">确定</button>
            </div>
        </div>

        <button class="btn btn-gray" id="btn-close-setting" style="width:100%;">关闭</button>
    </div>
</div>

<!-- 玩家改名弹窗，增加4位校验 -->
<div class="modal" id="rename-modal">
    <div class="modal-content">
        <div class="modal-title">修改玩家名字</div>
        <!-- 核心修改1：添加maxlength="4" 限制输入框最多输入4位 -->
        <input type="text" class="input-box" id="rename-input" placeholder="输入名字" maxlength="4">
        <div class="grid-2">
            <button class="btn btn-green" id="btn-confirm-rename">确定</button>
            <button class="btn btn-gray" id="btn-cancel-rename">取消</button>
        </div>
    </div>
</div>

<script>
// 游戏状态 + 本地存储
let gameState = {
    players: ['北家', '西家', '东家', '南家'],
    baseScore: 1,
    // 杠牌倍数
    gangMultiplier: {
        angang: 2,     // 暗杠：2倍，在场所有人出
        diangang: 2,   // 点杠：2倍，打出第四张的人出
        minggang: 1    // 明杠：1倍，在场所有人出
    },
    currentRound: 1,
    roundScores: [[0, 0, 0, 0]],
    historyLogs: [[]],
    stateHistory: [],
    playersHu: [false, false, false, false],
    currentAction: null,
    currentPlayer: null, // 通用当前选中玩家
    currentWinner: null, // 胡牌/杠牌的人
    renamingPlayer: null,
    playerClass: ['player-north', 'player-west', 'player-east', 'player-south'],
    playerSelectionLocked: false // 玩家选择锁定状态
};

const $ = (id) => document.getElementById(id);

// ===================== 本地存储功能 =====================
function saveGameState() {
    localStorage.setItem('chuanma_game_state', JSON.stringify(gameState));
}

function loadGameState() {
    const saved = localStorage.getItem('chuanma_game_state');
    if (saved) {
        gameState = JSON.parse(saved);
    }
}

// ===================== 设置弹窗显示当前配置 =====================
function updateSettingDisplay() {
    $('current-base').innerText = `当前底分：${gameState.baseScore}`;
    $('current-angang').innerText = `当前暗杠：${gameState.gangMultiplier.angang}倍`;
    $('current-diangang').innerText = `当前点杠：${gameState.gangMultiplier.diangang}倍`;
    $('current-minggang').innerText = `当前明杠：${gameState.gangMultiplier.minggang}倍`;
}

// 更新顶部杠倍数显示
function updateGangMultiDisplay() {
    $('gang-multi').innerText = `暗${gameState.gangMultiplier.angang}/点${gameState.gangMultiplier.diangang}/明${gameState.gangMultiplier.minggang}`;
}

// ===================== 玩家选择锁定/解锁 =====================
function lockPlayerSelection() {
    gameState.playerSelectionLocked = true;
    document.querySelectorAll('.player-card').forEach(card => {
        if (!card.classList.contains('active')) {
            card.classList.add('locked');
        }
    });
}

function unlockPlayerSelection() {
    gameState.playerSelectionLocked = false;
    document.querySelectorAll('.player-card').forEach(card => {
        card.classList.remove('locked');
    });
}

// ===================== 三家胡牌检查与处理 =====================
function checkThreePlayersHu() {
    const huCount = gameState.playersHu.filter(hu => hu).length;
    const isGameEnd = huCount >= 3;
    
    // 显示/隐藏结束提示
    $('game-end-notice').style.display = isGameEnd ? 'block' : 'none';
    
    // 禁用/启用所有操作按钮
    const actionButtons = [
        'btn-zimo', 'btn-dianpao', 
        'btn-angang', 'btn-diangang', 'btn-minggang'
    ];
    
    actionButtons.forEach(btnId => {
        $(btnId).disabled = isGameEnd;
    });
    
    // 如果游戏结束，解锁玩家选择（但按钮已禁用）
    if (isGameEnd) {
        unlockPlayerSelection();
    }
    
    return isGameEnd;
}

// ===================== 基础功能 =====================
function vibrate(duration = 50) {
    if (navigator.vibrate) navigator.vibrate(duration);
}

function addLongPress(el, callback, duration = 600) {
    let timer = null;
    let isLongPress = false;
    el.addEventListener('pointerdown', (e) => {
        isLongPress = false;
        timer = setTimeout(() => {
            isLongPress = true;
            vibrate(100);
            callback();
        }, duration);
    });
    el.addEventListener('pointermove', () => {
        if (timer) clearTimeout(timer);
    });
    el.addEventListener('pointerup', () => {
        if (timer) clearTimeout(timer);
    });
    el.addEventListener('pointercancel', () => {
        if (timer) clearTimeout(timer);
    });
    el.addEventListener('contextmenu', (e) => e.preventDefault());
}

function clearPlayerActive() {
    document.querySelectorAll('.player-card').forEach(card => {
        card.classList.remove('active');
    });
    gameState.currentPlayer = null;
}

function saveState() {
    gameState.stateHistory.push({
        roundScores: JSON.parse(JSON.stringify(gameState.roundScores)),
        historyLogs: JSON.parse(JSON.stringify(gameState.historyLogs)),
        playersHu: [...gameState.playersHu]
    });
    saveGameState(); // 自动保存
}

function getCurrentScores() {
    return gameState.roundScores[gameState.currentRound - 1];
}

// 渲染玩家
function renderPlayers() {
    const container = $('players-container');
    container.innerHTML = '';
    gameState.players.forEach((name, i) => {
        const card = document.createElement('div');
        let classes = `player-card ${gameState.playerClass[i]} ${gameState.playersHu[i] ? 'hu' : ''} ${gameState.currentPlayer === i ? 'active' : ''}`;
        // 锁定状态下，非选中玩家添加locked类
        if (gameState.playerSelectionLocked && gameState.currentPlayer !== i) {
            classes += ' locked';
        }
        card.className = classes;
        card.dataset.index = i;
        card.innerHTML = `
            <div class="player-name">${name}</div>
            <div class="player-score">${getCurrentScores()[i]}</div>
        `;
        // 长按改名
        addLongPress(card, () => {
            // 锁定状态下不允许改名
            if (gameState.playerSelectionLocked) return;
            gameState.renamingPlayer = i;
            $('rename-input').value = name;
            $('rename-modal').style.display = 'flex';
        });
        container.appendChild(card);
    });
    $('round-num').textContent = gameState.currentRound;
    $('base-score').textContent = gameState.baseScore;
    updateGangMultiDisplay();
    
    // 检查是否三家胡牌
    checkThreePlayersHu();
}

// ===================== 事件委托处理玩家点击 =====================
function initPlayerClickHandler() {
    const container = $('players-container');
    container.addEventListener('click', (e) => {
        // 锁定状态下不允许点击玩家
        if (gameState.playerSelectionLocked) return;
        
        // 三家胡牌后不允许点击玩家进行操作
        if (checkThreePlayersHu()) return;
        
        const card = e.target.closest('.player-card');
        if (!card) return;
        
        const playerIndex = parseInt(card.dataset.index);
        const playerName = gameState.players[playerIndex];
        
        vibrate();
        if (gameState.playersHu[playerIndex]) {
            alert(`${playerName} 已胡牌，无法操作`);
            return;
        }
        
        if (gameState.currentPlayer === playerIndex) {
            clearPlayerActive();
        } else {
            clearPlayerActive();
            gameState.currentPlayer = playerIndex;
            card.classList.add('active');
        }
    });
}

// 渲染操作记录
function renderHistory() {
    const logEl = $('history-log');
    logEl.innerHTML = '';
    for (let r = gameState.historyLogs.length - 1; r >= 0; r--) {
        const roundLog = gameState.historyLogs[r];
        if (roundLog.length === 0) continue;
        const roundDiv = document.createElement('div');
        roundDiv.style.marginBottom = '8px';
        roundDiv.innerHTML = `<strong>--- 第 ${r + 1} 局 ---</strong>`;
        [...roundLog].reverse().forEach(log => {
            const p = document.createElement('div');
            p.textContent = log;
            p.style.marginTop = '4px';
            roundDiv.appendChild(p);
        });
        logEl.appendChild(roundDiv);
    }
    if (!logEl.innerHTML) logEl.innerHTML = '<div style="text-align:center;color:#a7f3d0;">暂无记录</div>';
}

// 总战绩表格（玩家横向，局数纵向，新局在上）
function renderTotal() {
    const head = $('total-head');
    const body = $('total-body');
    
    // 表头：4个玩家横向显示
    let headHtml = '<tr><th>局数</th>';
    gameState.players.forEach(name => {
        headHtml += `<th>${name}</th>`;
    });
    headHtml += '</tr>';
    head.innerHTML = headHtml;

    // 表体：局数纵向，新局在上，旧局在下
    let bodyHtml = '';
    for (let r = gameState.roundScores.length; r >= 1; r--) {
        const roundIdx = r - 1;
        const scores = gameState.roundScores[roundIdx];
        let row = `<tr><td>第${r}局</td>`;
        scores.forEach(score => {
            row += `<td class="${score > 0 ? 'win' : score < 0 ? 'lose' : ''}">${score > 0 ? `+${score}` : score}</td>`;
        });
        row += '</tr>';
        bodyHtml += row;
    }

    // 总计行
    let totalRow = '<tr style="background:rgba(0,0,0,0.3);font-weight:bold;"><td>总计</td>';
    gameState.players.forEach((_, pIdx) => {
        let total = 0;
        gameState.roundScores.forEach(round => total += round[pIdx]);
        totalRow += `<td class="${total > 0 ? 'win' : total < 0 ? 'lose' : ''}">${total > 0 ? `+${total}` : total}</td>`;
    });
    totalRow += '</tr>';
    bodyHtml += totalRow;

    body.innerHTML = bodyHtml;
}

function showPanel(panelId) {
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    $(panelId).classList.add('active');
}

// 胡牌逻辑
function handleHu(fan, fanText) {
    saveState();
    const amount = gameState.baseScore * fan;
    const currentScores = getCurrentScores();
    const currentLog = gameState.historyLogs[gameState.currentRound - 1];

    if (gameState.currentAction === 'zimo') {
        // 自摸：当前选中的是赢家
        const winner = gameState.currentPlayer;
        for (let i = 0; i < 4; i++) {
            if (i !== winner && !gameState.playersHu[i]) {
                currentScores[i] -= amount;
                currentScores[winner] += amount;
            }
        }
        currentLog.push(`${gameState.players[winner]} ${fanText}自摸，每人-${amount}元`);
        gameState.playersHu[winner] = true;
    } else if (gameState.currentAction === 'dianpao') {
        // 点炮：当前选中的是点炮人，gameState.currentWinner是赢家
        const loser = gameState.currentPlayer;
        const winner = gameState.currentWinner;
        currentScores[loser] -= amount;
        currentScores[winner] += amount;
        currentLog.push(`${gameState.players[loser]} 点炮给 ${gameState.players[winner]}，${fanText}，-${amount}元`);
        gameState.playersHu[winner] = true;
    }

    unlockPlayerSelection(); // 操作完成解锁
    clearPlayerActive();
    renderPlayers();
    renderHistory();
    renderTotal();
    showPanel('main-panel');
    gameState.currentAction = null;
    gameState.currentWinner = null;
}

// ===================== 杠牌逻辑 =====================
function handleGang(type) {
    saveState();
    let multi, amount, currentLog = gameState.historyLogs[gameState.currentRound - 1];
    const currentScores = getCurrentScores();

    switch(type) {
        case 'angang': // 暗杠：当前选中的是杠牌人
            const anganger = gameState.currentPlayer;
            multi = gameState.gangMultiplier.angang;
            amount = gameState.baseScore * multi;
            for (let i = 0; i < 4; i++) {
                if (i !== anganger && !gameState.playersHu[i]) {
                    currentScores[i] -= amount;
                    currentScores[anganger] += amount;
                }
            }
            currentLog.push(`${gameState.players[anganger]} 暗杠，每人-${amount}元`);
            break;
            
        case 'diangang': // 点杠：当前选中的是点杠人，gameState.currentWinner是杠牌人
            const loser = gameState.currentPlayer;
            const dianganger = gameState.currentWinner;
            multi = gameState.gangMultiplier.diangang;
            amount = gameState.baseScore * multi;
            currentScores[loser] -= amount;
            currentScores[dianganger] += amount;
            currentLog.push(`${gameState.players[loser]} 点杠给 ${gameState.players[dianganger]}，-${amount}元`);
            break;
            
        case 'minggang': // 明杠：当前选中的是杠牌人
            const mingganger = gameState.currentPlayer;
            multi = gameState.gangMultiplier.minggang;
            amount = gameState.baseScore * multi;
            for (let i = 0; i < 4; i++) {
                if (i !== mingganger && !gameState.playersHu[i]) {
                    currentScores[i] -= amount;
                    currentScores[mingganger] += amount;
                }
            }
            currentLog.push(`${gameState.players[mingganger]} 明杠，每人-${amount}元`);
            break;
    }

    unlockPlayerSelection(); // 操作完成解锁
    clearPlayerActive();
    renderPlayers();
    renderHistory();
    renderTotal();
    showPanel('main-panel');
    gameState.currentWinner = null;
}

// 绑定所有事件
function bindEvents() {
    // 初始化玩家点击事件委托
    initPlayerClickHandler();

    // 打开设置 + 显示当前配置
    $('setting-btn').onclick = () => {
        vibrate();
        updateSettingDisplay();
        $('setting-modal').style.display = 'flex';
    };

    // 自摸
    $('btn-zimo').onclick = () => {
        vibrate();
        if (checkThreePlayersHu()) {
            alert('本局已结束！已有三家胡牌，请点击「下一局」开始新局');
            return;
        }
        if (gameState.currentPlayer === null) {
            alert('请先点击选中自摸的玩家');
            return;
        }
        gameState.currentAction = 'zimo';
        showPanel('fan-panel');
    };

    // ===================== 点炮逻辑（带玩家锁定） =====================
    $('btn-dianpao').onclick = () => {
        vibrate();
        if (checkThreePlayersHu()) {
            alert('本局已结束！已有三家胡牌，请点击「下一局」开始新局');
            return;
        }
        if (gameState.currentPlayer === null) {
            alert('请先点击选中点炮的玩家');
            return;
        }
        gameState.currentAction = 'dianpao';
        lockPlayerSelection(); // 锁定玩家选择
        const list = $('choose-list');
        list.innerHTML = '';
        gameState.players.forEach((name, i) => {
            if (i !== gameState.currentPlayer && !gameState.playersHu[i]) {
                const btn = document.createElement('button');
                btn.className = 'btn btn-green';
                btn.textContent = name;
                btn.onclick = () => {
                    vibrate();
                    gameState.currentWinner = i; // 记录赢家
                    showPanel('fan-panel');
                };
                list.appendChild(btn);
            }
        });
        $('choose-title').textContent = '点了谁的炮？';
        showPanel('choose-panel');
    };

    // 暗杠
    $('btn-angang').onclick = () => {
        vibrate();
        if (checkThreePlayersHu()) {
            alert('本局已结束！已有三家胡牌，请点击「下一局」开始新局');
            return;
        }
        if (gameState.currentPlayer === null) {
            alert('请先点击选中暗杠的玩家');
            return;
        }
        handleGang('angang');
    };

    // ===================== 点杠逻辑（带玩家锁定） =====================
    $('btn-diangang').onclick = () => {
        vibrate();
        if (checkThreePlayersHu()) {
            alert('本局已结束！已有三家胡牌，请点击「下一局」开始新局');
            return;
        }
        if (gameState.currentPlayer === null) {
            alert('请先点击选中点杠的玩家');
            return;
        }
        lockPlayerSelection(); // 锁定玩家选择
        const list = $('choose-list');
        list.innerHTML = '';
        gameState.players.forEach((name, i) => {
            if (i !== gameState.currentPlayer && !gameState.playersHu[i]) {
                const btn = document.createElement('button');
                btn.className = 'btn gang-diangang';
                btn.textContent = name;
                btn.onclick = () => {
                    vibrate();
                    gameState.currentWinner = i; // 记录杠牌人
                    handleGang('diangang');
                };
                list.appendChild(btn);
            }
        });
        $('choose-title').textContent = '点了谁的杠？';
        showPanel('choose-panel');
    };

    // 明杠
    $('btn-minggang').onclick = () => {
        vibrate();
        if (checkThreePlayersHu()) {
            alert('本局已结束！已有三家胡牌，请点击「下一局」开始新局');
            return;
        }
        if (gameState.currentPlayer === null) {
            alert('请先点击选中明杠的玩家');
            return;
        }
        handleGang('minggang');
    };

    // 番数选择
    document.querySelectorAll('.fan-btn').forEach(btn => {
        btn.onclick = () => {
            vibrate();
            handleHu(parseInt(btn.dataset.fan), `${btn.dataset.fan}番`);
        };
    });

    $('btn-custom-fan').onclick = () => {
        vibrate();
        const fan = parseInt($('custom-fan').value);
        if (isNaN(fan) || fan <= 0) return alert('请输入有效番数');
        handleHu(fan, `${fan}番`);
        $('custom-fan').value = '';
    };

    // 取消操作（解锁玩家）
    $('btn-cancel-fan').onclick = () => { 
        vibrate(); 
        unlockPlayerSelection(); // 取消时解锁
        showPanel('main-panel'); 
    };
    $('btn-cancel-choose').onclick = () => { 
        vibrate(); 
        unlockPlayerSelection(); // 取消时解锁
        showPanel('main-panel'); 
    };

    // 撤销
    $('btn-undo').onclick = () => {
        vibrate();
        if (!gameState.stateHistory.length) return alert('无操作可撤销');
        if (!confirm('确定撤销？')) return;
        const prev = gameState.stateHistory.pop();
        gameState.roundScores = prev.roundScores;
        gameState.historyLogs = prev.historyLogs;
        gameState.playersHu = prev.playersHu;
        saveGameState();
        unlockPlayerSelection(); // 撤销时确保解锁
        clearPlayerActive();
        renderPlayers();
        renderHistory();
        renderTotal();
    };

    // 下一局
    $('btn-next-round').onclick = () => {
        vibrate();
        if (!confirm('确定下一局？本局锁定')) return;
        gameState.currentRound++;
        gameState.roundScores.push([0,0,0,0]);
        gameState.historyLogs.push([]);
        gameState.playersHu = [false,false,false,false];
        gameState.stateHistory = [];
        saveGameState();
        unlockPlayerSelection(); // 下一局时确保解锁
        clearPlayerActive();
        renderPlayers();
        renderHistory();
        renderTotal();
        showPanel('main-panel');
    };

    // 重新开始
    $('btn-reset').onclick = () => {
        vibrate();
        if (!confirm('确定清空所有数据？')) return;
        gameState = {
            players: gameState.players,
            baseScore: 1,
            gangMultiplier: {angang:2, diangang:2, minggang:1},
            currentRound:1, roundScores:[[0,0,0,0]], historyLogs:[[]], stateHistory:[],
            playersHu:[false,false,false,false], currentAction:null, currentPlayer:null,
            currentWinner:null, renamingPlayer:null,
            playerClass:['player-north','player-west','player-east','player-south'],
            playerSelectionLocked: false
        };
        saveGameState();
        clearPlayerActive();
        renderPlayers();
        renderHistory();
        renderTotal();
    };

    // 设置相关
    document.querySelectorAll('.base-btn').forEach(btn => {
        btn.onclick = () => {
            vibrate();
            gameState.baseScore = parseInt(btn.dataset.score);
            updateSettingDisplay();
            saveGameState();
            renderPlayers();
        };
    });
    $('btn-custom-base').onclick = () => {
        vibrate();
        const s = parseInt($('custom-base').value);
        if (isNaN(s) || s<=0) return alert('无效');
        gameState.baseScore = s;
        updateSettingDisplay();
        saveGameState();
        renderPlayers();
        $('custom-base').value='';
    };

    // 暗杠倍数
    document.querySelectorAll('.angang-btn').forEach(btn => {
        btn.onclick = () => {
            vibrate();
            gameState.gangMultiplier.angang = parseInt(btn.dataset.multi);
            updateSettingDisplay();
            saveGameState();
            updateGangMultiDisplay();
        };
    });
    $('btn-custom-angang').onclick = () => {
        vibrate();
        const m = parseFloat($('custom-angang').value);
        if (isNaN(m) || m<0) return alert('无效');
        gameState.gangMultiplier.angang = m;
        updateSettingDisplay();
        saveGameState();
        updateGangMultiDisplay();
        $('custom-angang').value='';
    };

    // 点杠倍数
    document.querySelectorAll('.diangang-btn').forEach(btn => {
        btn.onclick = () => {
            vibrate();
            gameState.gangMultiplier.diangang = parseInt(btn.dataset.multi);
            updateSettingDisplay();
            saveGameState();
            updateGangMultiDisplay();
        };
    });
    $('btn-custom-diangang').onclick = () => {
        vibrate();
        const m = parseFloat($('custom-diangang').value);
        if (isNaN(m) || m<0) return alert('无效');
        gameState.gangMultiplier.diangang = m;
        updateSettingDisplay();
        saveGameState();
        updateGangMultiDisplay();
        $('custom-diangang').value='';
    };

    // 明杠倍数
    document.querySelectorAll('.minggang-btn').forEach(btn => {
        btn.onclick = () => {
            vibrate();
            gameState.gangMultiplier.minggang = parseInt(btn.dataset.multi);
            updateSettingDisplay();
            saveGameState();
            updateGangMultiDisplay();
        };
    });
    $('btn-custom-minggang').onclick = () => {
        vibrate();
        const m = parseFloat($('custom-minggang').value);
        if (isNaN(m) || m<0) return alert('无效');
        gameState.gangMultiplier.minggang = m;
        updateSettingDisplay();
        saveGameState();
        updateGangMultiDisplay();
        $('custom-minggang').value='';
    };

    // 弹窗关闭，增加校验4位名字
    $('btn-close-setting').onclick = () => { vibrate(); $('setting-modal').style.display='none'; };
    $('btn-confirm-rename').onclick = () => {
        vibrate();
        const name = $('rename-input').value.trim();
        if (!name) return alert('请输入名字');
        // 核心修改2：添加4位长度校验，超过则提示并阻止提交
        if (name.length > 4) return alert('名字最多只能输入4位，请修改！');
        gameState.players[gameState.renamingPlayer] = name;
        saveGameState();
        renderPlayers();
        renderTotal();
        $('rename-modal').style.display='none';
    };
    $('btn-cancel-rename').onclick = () => { vibrate(); $('rename-modal').style.display='none'; };

    // 点击空白关闭弹窗
    $('setting-modal').onclick = e => e.target === $('setting-modal') && ($('setting-modal').style.display='none');
    $('rename-modal').onclick = e => e.target === $('rename-modal') && ($('rename-modal').style.display='none');
}

// 初始化
function init() {
    loadGameState();
    bindEvents();
    renderPlayers();
    renderHistory();
    renderTotal();
}

init();
</script>
